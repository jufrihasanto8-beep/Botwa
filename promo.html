<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skema Promo · Adsy CS</title>
<link rel="stylesheet" href="css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;font-size:13px}

/* ── Sidebar ── */
.app-layout{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:#1e293b;height:100vh;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.07)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.sb-title{font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px}
.sb-subtitle{font-size:10px;color:#64748b;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 4px;margin-top:4px}
.bot-online{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:#22c55e;padding:6px 10px;background:rgba(34,197,94,.08);border-radius:6px;margin:8px 14px}.bot-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}.sb-item{display:flex!important;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:8px;font-size:13px;font-weight:500;color:#cbd5e1!important;text-decoration:none!important;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.05)!important;color:#e2e8f0!important}
.sb-item.active{background:rgba(59,130,246,.12)!important;color:#93c5fd!important}
body.light #sidebar{background:#f8fafc;border-right-color:rgba(0,0,0,.08)}
body.light .sb-brand{border-bottom-color:rgba(0,0,0,.07)}
body.light .sb-logo{background:linear-gradient(135deg,#1e293b,#334155)}
body.light .sb-title{color:#0f172a}
body.light .sb-subtitle{color:#64748b}
body.light .sb-section{color:#94a3b8}
body.light .sb-item{color:#475569!important}
body.light .sb-item:hover{background:rgba(0,0,0,.04)!important;color:#0f172a!important}
body.light .sb-item.active{background:rgba(59,130,246,.1)!important;color:#2563eb!important}
body.light .sb-divider{background:rgba(0,0,0,.07)}
body.light .sb-user{border-top-color:rgba(0,0,0,.07)}
body.light .bot-online{background:rgba(34,197,94,.06)}
.sb-item .si{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.sb-item .si svg{width:16px;height:16px;display:block}
.sb-divider{height:1px;background:rgba(255,255,255,.05);margin:4px 8px}
.sb-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* ── Layout ── */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.page-header{background:#161b22;border-bottom:1px solid rgba(255,255,255,.06);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-header h1{font-size:18px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px}
.page-header p{font-size:12px;color:#64748b;margin-top:2px}
.page-body{flex:1;overflow-y:auto;padding:24px}
.page-body::-webkit-scrollbar{width:4px}
.page-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

/* ── Filter ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.s-tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.08);background:none;color:#64748b;cursor:pointer;transition:all .12s}
.s-tab:hover{border-color:#3b82f6;color:#93c5fd}
.s-tab.active{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.3)}

/* ── Promo Cards ── */
.promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.promo-card{background:#161b22;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;transition:border-color .15s;display:flex;flex-direction:column}
.promo-card:hover{border-color:rgba(59,130,246,.2)}
.promo-card-head{padding:14px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.promo-nama{font-weight:600;font-size:14px;color:#f1f5f9;margin-bottom:5px}
.promo-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block}
.tipe-diskon{background:rgba(251,113,133,.12);color:#fda4af}
.tipe-voucher{background:rgba(167,139,250,.12);color:#c4b5fd}
.tipe-bundling{background:rgba(52,211,153,.12);color:#6ee7b7}
.tipe-ongkir{background:rgba(56,189,248,.12);color:#7dd3fc}
.badge-aktif{background:rgba(34,197,94,.12);color:#86efac;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-nonaktif{background:rgba(100,116,139,.1);color:#64748b;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.promo-card-body{padding:0 16px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.promo-row{display:flex;gap:8px;align-items:baseline}
.promo-lbl{font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.3px;min-width:68px;flex-shrink:0}
.promo-val{font-size:12px;color:#e2e8f0;font-weight:500}
.promo-desc{font-size:12px;color:#64748b;line-height:1.5;margin-top:2px}
.promo-foot{padding:10px 16px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px;justify-content:space-between;align-items:center}
.promo-periode-text{font-size:11px;color:#475569}

/* ── Voucher kode ── */
.kode-badge{display:inline-block;background:#0d1117;border:1px dashed rgba(167,139,250,.4);color:#c4b5fd;font-size:13px;font-weight:700;padding:3px 12px;border-radius:6px;letter-spacing:2px;font-family:monospace}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.btn-sm{padding:4px 9px!important;font-size:11px!important}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#3b82f6);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary:hover{box-shadow:0 4px 12px rgba(59,130,246,.35)}
.btn-secondary{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.btn-danger{display:inline-flex;align-items:center;padding:6px 10px;border-radius:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:12px;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:rgba(239,68,68,.18)}

/* ── Forms ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group textarea,.form-group select{background:#0d1117;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-family:inherit;outline:none;transition:border-color .15s;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(59,130,246,.4)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#374151}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-head{padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1e293b;z-index:1}
.modal-head h3{font-size:15px;font-weight:700;color:#f1f5f9}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#1e293b}
.field-group{display:none}
.field-group.show{display:block}
.divider{height:1px;background:rgba(255,255,255,.05);margin:16px 0}

/* ── Empty state ── */
.empty{text-align:center;padding:80px 24px;color:#64748b}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px;margin-bottom:16px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1}

/* ── Icon button ── */
.icon-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#64748b;transition:all .15s}
.icon-btn:hover{border-color:#3b82f6;color:#3b82f6}

/* ══ LIGHT THEME OVERRIDES ══ */
body.light{background:#f1f5f9;color:#0f172a}
body.light .page-header{background:#fff;border-color:#e2e8f0}
body.light .page-header h1{color:#0f172a}
body.light .page-header p{color:#64748b}
body.light .icon-btn{background:#f1f5f9;border-color:#e2e8f0;color:#64748b}
body.light .page-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1)}
body.light .s-tab{border-color:#e2e8f0;color:#64748b}
body.light .s-tab:hover{border-color:#3b82f6;color:#2563eb}
body.light .s-tab.active{background:rgba(59,130,246,.1);color:#2563eb;border-color:rgba(59,130,246,.3)}
body.light .promo-card{background:#fff;border-color:#e2e8f0}
body.light .promo-card:hover{border-color:rgba(59,130,246,.3)}
body.light .promo-nama{color:#0f172a}
body.light .promo-lbl{color:#94a3b8}
body.light .promo-val{color:#0f172a}
body.light .promo-desc{color:#64748b}
body.light .promo-foot{border-color:#f1f5f9}
body.light .promo-periode-text{color:#94a3b8}
body.light .kode-badge{background:#f8fafc;border-color:rgba(139,92,246,.3);color:#7c3aed}
body.light .btn{background:#f1f5f9;border-color:#e2e8f0;color:#64748b}
body.light .btn:hover{background:#e2e8f0;color:#0f172a}
body.light .btn-secondary{background:#f1f5f9;border-color:#e2e8f0;color:#64748b}
body.light .form-group label{color:#64748b}
body.light .form-group input,body.light .form-group textarea,body.light .form-group select{background:#f8fafc;border-color:#e2e8f0;color:#0f172a}
body.light .form-group input::placeholder,body.light .form-group textarea::placeholder{color:#94a3b8}
body.light .modal-box{background:#fff;border-color:#e2e8f0}
body.light .modal-head{background:#fff;border-color:#e2e8f0}
body.light .modal-head h3{color:#0f172a}
body.light .modal-foot{background:#fff;border-color:#e2e8f0}
body.light .divider{background:#e2e8f0}
body.light .empty{color:#64748b}
</style>
</head>

    </div>
    <div class="modal-body">

      <div class="form-group">
        <label>Tipe Promo *</label>
        <select id="f-tipe" onchange="onTipeChange()">
          <option value="diskon">🏷️ Diskon</option>
          <option value="voucher">🎟️ Voucher Kode</option>
          <option value="bundling">📦 Bundling</option>
          <option value="ongkir">🚚 Promo Ongkir</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nama Promo *</label>
        <input type="text" id="f-nama" placeholder="contoh: Flash Sale Akhir Bulan">
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="f-desc" rows="2" placeholder="Info tambahan yang perlu diketahui customer..."></textarea>
      </div>

      <div class="divider"></div>

      <!-- ── Diskon fields ── -->
      <div class="field-group show" id="fg-diskon">
        <div class="form-grid">
          <div class="form-group">
            <label>Nilai Diskon *</label>
            <input type="number" id="f-nilai" placeholder="50000">
          </div>
          <div class="form-group">
            <label>Tipe Nilai</label>
            <select id="f-tipe-nilai">
              <option value="nominal">Nominal (Rp)</option>
              <option value="persen">Persentase (%)</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Periode Mulai</label>
            <input type="date" id="f-mulai">
          </div>
          <div class="form-group">
            <label>Periode Selesai</label>
            <input type="date" id="f-selesai">
          </div>
        </div>
      </div>

      <!-- ── Voucher fields ── -->
      <div class="field-group" id="fg-voucher">
        <div class="form-grid">
          <div class="form-group">
            <label>Nilai Diskon *</label>
            <input type="number" id="fv-nilai" placeholder="20000">
          </div>
          <div class="form-group">
            <label>Tipe Nilai</label>
            <select id="fv-tipe-nilai">
              <option value="nominal">Nominal (Rp)</option>
              <option value="persen">Persentase (%)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Kode Voucher *</label>
          <input type="text" id="fv-kode" placeholder="HERBAL20" style="text-transform:uppercase;letter-spacing:2px;font-weight:700;font-family:monospace">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Minimal Belanja (Rp)</label>
            <input type="number" id="fv-min" placeholder="100000">
          </div>
          <div class="form-group">
            <label>Berlaku s/d</label>
            <input type="date" id="fv-selesai">
          </div>
        </div>
      </div>

      <!-- ── Bundling fields ── -->
      <div class="field-group" id="fg-bundling">
        <div class="form-group">
          <label>Syarat *</label>
          <input type="text" id="fb-syarat" placeholder="contoh: Beli 2 botol Herbal Sinus Pro">
        </div>
        <div class="form-group">
          <label>Benefit yang Didapat *</label>
          <input type="text" id="fb-benefit" placeholder="contoh: Gratis 1 botol Herbal Sinus Mini (100ml)">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Periode Mulai</label>
            <input type="date" id="fb-mulai">
          </div>
          <div class="form-group">
            <label>Periode Selesai</label>
            <input type="date" id="fb-selesai">
          </div>
        </div>
      </div>

      <!-- ── Ongkir fields ── -->
      <div class="field-group" id="fg-ongkir">
        <div class="form-group">
          <label>Benefit Ongkir *</label>
          <input type="text" id="fo-benefit" placeholder="contoh: Gratis ongkir / Potongan ongkir Rp15.000">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Minimal Belanja (Rp)</label>
            <input type="number" id="fo-min" placeholder="150000">
          </div>
          <div class="form-group">
            <label>Wilayah Berlaku</label>
            <input type="text" id="fo-wilayah" placeholder="Seluruh Indonesia">
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Periode Mulai</label>
            <input type="date" id="fo-mulai">
          </div>
          <div class="form-group">
            <label>Periode Selesai</label>
            <input type="date" id="fo-selesai">
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="form-group" style="margin-bottom:0">
        <label>Status</label>
        <select id="f-aktif">
          <option value="true">Aktif</option>
          <option value="false">Nonaktif</option>
        </select>
      </div>

    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn-primary" onclick="savePromo()">Simpan Promo</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/theme.js"></script>
<script>
const SB_URL = window.SUPABASE_URL;
const SB_KEY = window.SUPABASE_ANON_KEY;
const sbH = { 'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY };

let currentUserId = null;
let allPromos = [];
let filterState = 'semua';
let editId = null;

async function sbGet(t, q='') {
  const r = await fetch(`${SB_URL}/rest/v1/${t}${q}`, { headers: sbH });
  return r.json();
}
async function sbPost(t, b) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}`, { method:'POST', headers:{...sbH,'Prefer':'return=representation'}, body:JSON.stringify(b) });
  const data = await r.json();
  if (!r.ok) throw new Error(data?.message || data?.error || JSON.stringify(data));
  return data;
}
async function sbPatch(t, q, b) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}${q}`, { method:'PATCH', headers:{...sbH,'Prefer':'return=representation'}, body:JSON.stringify(b) });
  const data = await r.json();
  if (!r.ok) throw new Error(data?.message || data?.error || JSON.stringify(data));
  return data;
}
async function sbDelete(t, q) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}${q}`, { method:'DELETE', headers: sbH });
  if (!r.ok) { const d = await r.json(); throw new Error(d?.message || JSON.stringify(d)); }
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'error' ? '❌ ' : '✅ ') + msg;
  el.className = 'show';
  setTimeout(() => el.className = '', 3000);
}

function rp(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

Auth.guard();
(function(){
  const u = Auth.getUser();
  if (u) {
    document.getElementById('sb-av').textContent = (u.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sb-name').textContent = u.name || 'Admin';
    document.getElementById('sb-store').textContent = u.store || 'Adsy CS';
  }
})();

async function init() {
  currentUserId = Auth.getUser()?.id;
  await loadPromos();
}

async function loadPromos() {
  allPromos = await sbGet('promos', `?user_id=eq.${currentUserId}&order=created_at.desc`);
  renderGrid();
}

function setFilter(f, btn) {
  filterState = f;
  document.querySelectorAll('.s-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

const TIPE_LABEL = { diskon:'Diskon', voucher:'Voucher', bundling:'Bundling', ongkir:'Promo Ongkir' };

function renderGrid() {
  let data = allPromos;
  if (filterState !== 'semua') data = data.filter(p => p.tipe === filterState);

  const grid = document.getElementById('promo-grid');
  if (!data.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🎁</div>
      <p>Belum ada promo${filterState !== 'semua' ? ' untuk kategori ini' : ''}.</p>
      <button class="btn-primary" onclick="openModal()">+ Tambah Promo</button>
    </div>`;
    return;
  }

  grid.innerHTML = data.map(p => cardHTML(p)).join('');
}

function cardHTML(p) {
  const badgeClass = `tipe-${p.tipe}`;
  const statusBadge = p.aktif
    ? `<span class="badge-aktif">Aktif</span>`
    : `<span class="badge-nonaktif">Nonaktif</span>`;

  let details = '';
  let periodeText = '';

  if (p.tipe === 'diskon') {
    const nilaiStr = p.tipe_nilai === 'persen' ? `${p.nilai}%` : rp(p.nilai);
    details = `<div class="promo-row"><span class="promo-lbl">Potongan</span><span class="promo-val" style="color:#86efac;font-size:15px;font-weight:700">${nilaiStr}</span></div>`;
    if (p.periode_mulai || p.periode_selesai) periodeText = `${fmtDate(p.periode_mulai)} – ${fmtDate(p.periode_selesai)}`;
  }

  if (p.tipe === 'voucher') {
    const nilaiStr = p.tipe_nilai === 'persen' ? `${p.nilai}%` : rp(p.nilai);
    details = `
      <div class="promo-row"><span class="promo-lbl">Kode</span><span class="kode-badge">${esc(p.kode) || '-'}</span></div>
      <div class="promo-row"><span class="promo-lbl">Diskon</span><span class="promo-val" style="color:#c4b5fd;font-weight:700">${nilaiStr}</span></div>
      ${p.min_belanja ? `<div class="promo-row"><span class="promo-lbl">Min. Beli</span><span class="promo-val">${rp(p.min_belanja)}</span></div>` : ''}`;
    if (p.periode_selesai) periodeText = `Berlaku s/d ${fmtDate(p.periode_selesai)}`;
  }

  if (p.tipe === 'bundling') {
    details = `
      <div class="promo-row"><span class="promo-lbl">Syarat</span><span class="promo-val">${esc(p.syarat) || '-'}</span></div>
      <div class="promo-row"><span class="promo-lbl">Benefit</span><span class="promo-val" style="color:#6ee7b7">${esc(p.benefit) || '-'}</span></div>`;
    if (p.periode_mulai || p.periode_selesai) periodeText = `${fmtDate(p.periode_mulai)} – ${fmtDate(p.periode_selesai)}`;
  }

  if (p.tipe === 'ongkir') {
    details = `
      <div class="promo-row"><span class="promo-lbl">Benefit</span><span class="promo-val" style="color:#7dd3fc">${esc(p.benefit) || '-'}</span></div>
      ${p.min_belanja ? `<div class="promo-row"><span class="promo-lbl">Min. Beli</span><span class="promo-val">${rp(p.min_belanja)}</span></div>` : ''}
      ${p.wilayah ? `<div class="promo-row"><span class="promo-lbl">Wilayah</span><span class="promo-val">${esc(p.wilayah)}</span></div>` : ''}`;
    if (p.periode_mulai || p.periode_selesai) periodeText = `${fmtDate(p.periode_mulai)} – ${fmtDate(p.periode_selesai)}`;
  }

  return `<div class="promo-card">
    <div class="promo-card-head">
      <div>
        <div class="promo-nama">${esc(p.nama)}</div>
        <span class="promo-badge ${badgeClass}">${esc(TIPE_LABEL[p.tipe] || p.tipe)}</span>
      </div>
      ${statusBadge}
    </div>
    <div class="promo-card-body">
      ${details}
      ${p.deskripsi ? `<div class="promo-desc" style="margin-top:4px">${esc(p.deskripsi)}</div>` : ''}
    </div>
    <div class="promo-foot">
      <span class="promo-periode-text">${periodeText}</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="openEdit('${p.id}')">✏️ Edit</button>
        <button class="btn-danger btn-sm" onclick="hapus('${p.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

/* ── Modal ── */
function onTipeChange() {
  const tipe = document.getElementById('f-tipe').value;
  document.querySelectorAll('.field-group').forEach(el => el.classList.remove('show'));
  document.getElementById(`fg-${tipe}`)?.classList.add('show');
}

function clearForm() {
  ['f-nama','f-desc','f-nilai','fv-nilai','fv-kode','fv-min','fv-selesai',
   'fb-syarat','fb-benefit','fb-mulai','fb-selesai',
   'fo-benefit','fo-min','fo-wilayah','fo-mulai','fo-selesai',
   'f-mulai','f-selesai'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-tipe').value = 'diskon';
  document.getElementById('f-tipe-nilai').value = 'nominal';
  document.getElementById('fv-tipe-nilai').value = 'nominal';
  document.getElementById('f-aktif').value = 'true';
  onTipeChange();
}

function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Tambah Promo';
  clearForm();
  document.getElementById('promo-modal').classList.add('open');
}

function openEdit(id) {
  const p = allPromos.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit Promo';

  document.getElementById('f-tipe').value = p.tipe;
  onTipeChange();
  document.getElementById('f-nama').value = p.nama || '';
  document.getElementById('f-desc').value = p.deskripsi || '';
  document.getElementById('f-aktif').value = String(p.aktif);

  if (p.tipe === 'diskon') {
    document.getElementById('f-nilai').value = p.nilai || '';
    document.getElementById('f-tipe-nilai').value = p.tipe_nilai || 'nominal';
    document.getElementById('f-mulai').value = p.periode_mulai || '';
    document.getElementById('f-selesai').value = p.periode_selesai || '';
  }
  if (p.tipe === 'voucher') {
    document.getElementById('fv-nilai').value = p.nilai || '';
    document.getElementById('fv-tipe-nilai').value = p.tipe_nilai || 'nominal';
    document.getElementById('fv-kode').value = p.kode || '';
    document.getElementById('fv-min').value = p.min_belanja || '';
    document.getElementById('fv-selesai').value = p.periode_selesai || '';
  }
  if (p.tipe === 'bundling') {
    document.getElementById('fb-syarat').value = p.syarat || '';
    document.getElementById('fb-benefit').value = p.benefit || '';
    document.getElementById('fb-mulai').value = p.periode_mulai || '';
    document.getElementById('fb-selesai').value = p.periode_selesai || '';
  }
  if (p.tipe === 'ongkir') {
    document.getElementById('fo-benefit').value = p.benefit || '';
    document.getElementById('fo-min').value = p.min_belanja || '';
    document.getElementById('fo-wilayah').value = p.wilayah || '';
    document.getElementById('fo-mulai').value = p.periode_mulai || '';
    document.getElementById('fo-selesai').value = p.periode_selesai || '';
  }

  document.getElementById('promo-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('promo-modal').classList.remove('open');
}

async function savePromo() {
  const tipe = document.getElementById('f-tipe').value;
  const nama = document.getElementById('f-nama').value.trim();
  if (!nama) { toast('Nama promo wajib diisi', 'error'); return; }

  const payload = {
    user_id: currentUserId,
    tipe,
    nama,
    deskripsi: document.getElementById('f-desc').value.trim(),
    aktif: document.getElementById('f-aktif').value === 'true',
    nilai: null, tipe_nilai: null, kode: null, min_belanja: null,
    syarat: null, benefit: null, wilayah: null,
    periode_mulai: null, periode_selesai: null,
  };

  if (tipe === 'diskon') {
    payload.nilai = parseFloat(document.getElementById('f-nilai').value) || null;
    payload.tipe_nilai = document.getElementById('f-tipe-nilai').value;
    payload.periode_mulai = document.getElementById('f-mulai').value || null;
    payload.periode_selesai = document.getElementById('f-selesai').value || null;
  }
  if (tipe === 'voucher') {
    payload.nilai = parseFloat(document.getElementById('fv-nilai').value) || null;
    payload.tipe_nilai = document.getElementById('fv-tipe-nilai').value;
    payload.kode = document.getElementById('fv-kode').value.trim().toUpperCase();
    payload.min_belanja = parseFloat(document.getElementById('fv-min').value) || null;
    payload.periode_selesai = document.getElementById('fv-selesai').value || null;
    if (!payload.kode) { toast('Kode voucher wajib diisi', 'error'); return; }
  }
  if (tipe === 'bundling') {
    payload.syarat = document.getElementById('fb-syarat').value.trim();
    payload.benefit = document.getElementById('fb-benefit').value.trim();
    payload.periode_mulai = document.getElementById('fb-mulai').value || null;
    payload.periode_selesai = document.getElementById('fb-selesai').value || null;
    if (!payload.syarat || !payload.benefit) { toast('Syarat dan benefit wajib diisi', 'error'); return; }
  }
  if (tipe === 'ongkir') {
    payload.benefit = document.getElementById('fo-benefit').value.trim();
    payload.min_belanja = parseFloat(document.getElementById('fo-min').value) || null;
    payload.wilayah = document.getElementById('fo-wilayah').value.trim();
    payload.periode_mulai = document.getElementById('fo-mulai').value || null;
    payload.periode_selesai = document.getElementById('fo-selesai').value || null;
    if (!payload.benefit) { toast('Benefit ongkir wajib diisi', 'error'); return; }
  }

  try {
    if (editId) {
      await sbPatch('promos', `?id=eq.${editId}`, payload);
      toast('Promo diupdate!');
    } else {
      await sbPost('promos', payload);
      toast('Promo ditambahkan!');
    }
    closeModal();
    await loadPromos();
  } catch (e) {
    toast('Gagal simpan: ' + e.message, 'error');
  }
}

async function hapus(id) {
  if (!confirm('Hapus promo ini?')) return;
  await sbDelete('promos', `?id=eq.${id}`);
  toast('Promo dihapus');
  await loadPromos();
}

init();

async function checkBotStatus() {
  const sbBot = document.getElementById('sb-bot-status');
  const uid = (typeof userId !== 'undefined') ? userId : (window.Auth?.getUser()?.id);
  if (!sbBot || !uid) return;
  try {
    const res = await fetch('/api/baileys-proxy?path=' + encodeURIComponent('/session/status/' + uid));
    const s = await res.json();
    if (s.status === 'connected') {
      sbBot.innerHTML = '<div class="bot-dot"></div> Bot online';
      sbBot.style.color = '#22c55e';
    } else {
      sbBot.innerHTML = '⚠️ Bot offline';
      sbBot.style.color = '#f59e0b';
    }
  } catch(e) {
    sbBot.innerHTML = '⚠️ Bot offline';
    sbBot.style.color = '#f59e0b';
  }
}
checkBotStatus();
</script>
</body>
</html>
