<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelanggan · Adsy CS</title>
<script>if(localStorage.getItem('cs_theme')==='light')document.body.classList.add('light');</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── LIGHT MODE OVERRIDES (pakai variable yang sama dgn style.css) ── */
:root{--card2:#1e293b}
body.light{
  --bg:#f1f5f9;--white:#ffffff;--card2:#f8fafc;
  --border:rgba(0,0,0,.07);
  --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
}

.main-content{background:var(--bg);min-height:100vh;padding:0}

/* ── PAGE HEADER ── */
.ph{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ph-left h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.ph-left p{font-size:12px;color:var(--text-2);margin-top:3px}
.ph-right{display:flex;gap:8px}
.icon-btn2{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.icon-btn2:hover{border-color:#3b82f6;color:#3b82f6}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px 24px}
@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .15s}
.sc:hover{box-shadow:0 4px 20px rgba(0,0,0,.15)}
body.light .sc:hover{box-shadow:0 4px 20px rgba(0,0,0,.06)}
.sc-icon{font-size:20px;margin-bottom:10px;display:block}
.sc-label{font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sc-num{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.sc-sub{font-size:11px;color:var(--text-2);margin-top:6px;display:flex;align-items:center;gap:4px}
.sc-sub .up{color:#22c55e;font-weight:600}
.sc-sub .warn{color:#f59e0b;font-weight:600}
.sc.blue .sc-num{color:#3b82f6}
.sc.green .sc-num{color:#22c55e}
.sc.yellow .sc-num{color:#f59e0b}
.sc.purple .sc-num{color:#a78bfa}

/* ── TABLE CARD ── */
.tc{background:var(--white);border:1px solid var(--border);border-radius:16px;margin:0 24px 24px;overflow:hidden}

/* Table Toolbar */
.tc-toolbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tc-title{font-size:14px;font-weight:700;color:var(--text);flex-shrink:0}
.tabs2{display:flex;background:var(--bg);border-radius:9px;padding:3px;gap:2px}
.tab2{padding:5px 16px;border-radius:7px;border:none;background:none;color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.tab2.active{background:var(--white);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.18)}
body.light .tab2.active{box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tc-spacer{flex:1}
.search2{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 12px;min-width:200px}
.search2 input{border:none;background:none;color:var(--text);font-size:12px;outline:none;width:100%}
.search2 input::placeholder{color:var(--text-2)}
.search2 span{color:var(--text-2);font-size:13px;flex-shrink:0}

/* Table */
.tc-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg)}
th{padding:10px 18px;text-align:left;font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:13px 18px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(59,130,246,.04)}

/* Customer cell */
.cust-cell{display:flex;align-items:center;gap:11px}
.c-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.c-name{font-size:13px;font-weight:600;color:var(--text)}
.c-since{font-size:11px;color:var(--text-2);margin-top:1px}

/* Phone */
.phone-txt{font-size:12px;color:var(--text-2);font-family:'SF Mono','Fira Code',monospace}

/* Badges */
.bdg{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bdg-green{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.bdg-yellow{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.bdg-blue{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.bdg-gray{background:rgba(100,116,139,.08);color:var(--text-2);border:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:#22c55e}
.dot-yellow{background:#f59e0b}
.dot-gray{background:#64748b}

/* Action */
.act{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-2);font-size:14px;text-decoration:none;transition:all .15s;cursor:pointer}
.act:hover{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.06)}

/* Empty */
.empty-cell{text-align:center;padding:56px 20px;color:var(--text-2)}
.empty-cell .e-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-cell p{font-size:13px}

/* Pager */
.pager{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-top:1px solid var(--border)}
.pager-info{font-size:12px;color:var(--text-2)}
.pager-btns{display:flex;gap:6px}
.pager-btn{padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text-2);font-size:12px;cursor:pointer;transition:all .12s}
.pager-btn:hover:not(:disabled){border-color:#3b82f6;color:#3b82f6}
.pager-btn:disabled{opacity:.3;cursor:default}

/* Loading skeleton */
.skel{background:linear-gradient(90deg,var(--border) 25%,rgba(255,255,255,.04) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
body.light .skel{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">

    <!-- Page Header -->
    <div class="ph">
      <div class="ph-left">
        <h1>👥 Pelanggan</h1>
        <p>Database pelanggan yang tumbuh otomatis tiap ada chat masuk</p>
      </div>
      <div class="ph-right">
        <button class="icon-btn2" onclick="init()">↻ Refresh</button>
      </div>
    </div>

    <!-- Stat Cards -->
    <div class="stat-row" id="stat-row">
      <div class="sc"><div class="skel" style="height:12px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:28px;width:60px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:100px"></div></div>
      <div class="sc"><div class="skel" style="height:12px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:28px;width:60px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:100px"></div></div>
      <div class="sc"><div class="skel" style="height:12px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:28px;width:60px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:100px"></div></div>
      <div class="sc"><div class="skel" style="height:12px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:28px;width:60px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:100px"></div></div>
    </div>

    <!-- Table -->
    <div class="tc">
      <div class="tc-toolbar">
        <span class="tc-title">Daftar Pelanggan</span>
        <div class="tabs2">
          <button class="tab2 active" onclick="setTab('semua',this)">Semua</button>
          <button class="tab2" onclick="setTab('aktif',this)">Bot Aktif</button>
          <button class="tab2" onclick="setTab('eskalasi',this)">Eskalasi</button>
        </div>
        <div class="tc-spacer"></div>
        <div class="search2">
          <span>🔍</span>
          <input type="text" placeholder="Cari nama atau nomor..." oninput="onSearch(this.value)" />
        </div>
      </div>

      <div class="tc-wrap">
        <table>
          <thead>
            <tr>
              <th>Pelanggan</th>
              <th>Nomor WA</th>
              <th>Sesi</th>
              <th>Aktivitas Terakhir</th>
              <th>Status</th>
              <th style="text-align:center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="empty-cell"><div class="e-icon">⏳</div><p>Memuat data pelanggan...</p></td></tr>
          </tbody>
        </table>
      </div>

      <div class="pager">
        <span class="pager-info" id="pager-info">—</span>
        <div class="pager-btns">
          <button class="pager-btn" id="btn-prev" onclick="prevPage()" disabled>‹ Prev</button>
          <button class="pager-btn" id="btn-next" onclick="nextPage()" disabled>Next ›</button>
        </div>
      </div>
    </div>

  </div><!-- /main-content -->
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/theme.js"></script>
<script>
Auth.guard();
document.getElementById('sidebar-container').innerHTML = renderSidebar('contacts');
checkBotStatus();

/* ── SUPABASE ── */
function sbFetch(table, query) {
  const url  = window.SUPABASE_URL;
  const key  = window.SUPABASE_ANON_KEY;
  return fetch(`${url}/rest/v1/${table}${query}`, {
    headers: { 'Content-Type':'application/json', apikey: key, Authorization: 'Bearer ' + key }
  }).then(r => r.ok ? r.json() : []).catch(() => []);
}

/* ── AVATAR ── */
const AV_COLORS = ['#3b82f6','#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444'];
function avColor(n) {
  let h = 0; for (const c of (n||'?')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
  return AV_COLORS[Math.abs(h) % AV_COLORS.length];
}
function avInit(n) { return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

/* ── STATE ── */
const uid = Auth.getUser()?.id;
let allCustomers = [], convMap = {}, currentTab = 'semua', q = '', page = 1;
const PER_PAGE = 25;

/* ── INIT ── */
async function init() {
  showSkel();

  const [customers, convs] = await Promise.all([
    sbFetch('customers', `?user_id=eq.${uid}&order=created_at.desc&select=id,wa_number,nama,created_at`),
    sbFetch('conversations', `?user_id=eq.${uid}&select=id,customer_id,status,last_msg_at&order=last_msg_at.desc`)
  ]);

  /* Build convMap: customer_id → latest conv */
  convMap = {};
  for (const c of convs) {
    if (!convMap[c.customer_id]) {
      convMap[c.customer_id] = { convId: c.id, status: c.status, last_msg_at: c.last_msg_at, count: 0 };
    }
    convMap[c.customer_id].count++;
  }

  allCustomers = customers;

  /* ── STATS ── */
  const today = new Date().toISOString().split('T')[0] + 'T00:00:00.000Z';
  const total  = customers.length;
  const baru   = customers.filter(c => c.created_at >= today).length;
  const aktif  = new Set(convs.filter(c => c.status==='baru'||c.status==='diproses').map(c=>c.customer_id)).size;
  const eskal  = new Set(convs.filter(c => c.status==='eskalasi').map(c=>c.customer_id)).size;
  const pesanHariIni = convs.filter(c => c.last_msg_at >= today).length;

  document.getElementById('stat-row').innerHTML = `
    <div class="sc blue">
      <span class="sc-icon">👥</span>
      <div class="sc-label">Total Pelanggan</div>
      <div class="sc-num">${total}</div>
      <div class="sc-sub"><span class="up">+${baru}</span> bergabung hari ini</div>
    </div>
    <div class="sc green">
      <span class="sc-icon">🤖</span>
      <div class="sc-label">Bot Aktif</div>
      <div class="sc-num">${aktif}</div>
      <div class="sc-sub">${total ? Math.round(aktif/total*100) : 0}% dari total pelanggan</div>
    </div>
    <div class="sc yellow">
      <span class="sc-icon">⚠️</span>
      <div class="sc-label">Perlu Eskalasi</div>
      <div class="sc-num">${eskal}</div>
      <div class="sc-sub"><span class="warn">${total ? (eskal/total*100).toFixed(1) : 0}%</span> butuh perhatian</div>
    </div>
    <div class="sc purple">
      <span class="sc-icon">💬</span>
      <div class="sc-label">Pesan Masuk Hari Ini</div>
      <div class="sc-num">${pesanHariIni}</div>
      <div class="sc-sub">percakapan aktif hari ini</div>
    </div>`;

  page = 1;
  renderTable();
}

function showSkel() {
  const skel = `<div class="sc"><div class="skel" style="height:12px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:28px;width:60px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:100px"></div></div>`;
  document.getElementById('stat-row').innerHTML = skel.repeat(4);
  document.getElementById('tbody').innerHTML = `<tr><td colspan="6" class="empty-cell"><div class="e-icon">⏳</div><p>Memuat data...</p></td></tr>`;
}

/* ── TABLE ── */
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab2').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  page = 1; renderTable();
}

function onSearch(v) { q = v.toLowerCase().trim(); page = 1; renderTable(); }

function getFiltered() {
  let list = allCustomers;
  if (currentTab === 'aktif')     list = list.filter(c => { const m=convMap[c.id]; return m&&(m.status==='baru'||m.status==='diproses'); });
  if (currentTab === 'eskalasi') list = list.filter(c => convMap[c.id]?.status==='eskalasi');
  if (q) list = list.filter(c => (c.nama||'').toLowerCase().includes(q) || (c.wa_number||'').includes(q));
  return list;
}

function renderTable() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const start    = (page - 1) * PER_PAGE;
  const items    = filtered.slice(start, start + PER_PAGE);
  const tbody    = document.getElementById('tbody');

  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-cell"><div class="e-icon">👥</div><p>${q ? 'Pelanggan tidak ditemukan.' : 'Belum ada pelanggan.'}</p></td></tr>`;
    document.getElementById('pager-info').textContent = '0 pelanggan';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  tbody.innerHTML = items.map(c => {
    const m       = convMap[c.id] || {};
    const nama    = c.nama || c.wa_number || '—';
    const color   = avColor(nama);
    const init2   = avInit(nama);
    const lastAt  = m.last_msg_at ? relTime(m.last_msg_at) : '—';
    const since   = c.created_at ? 'Sejak ' + fmtDate(c.created_at) : '';
    const chatUrl = m.convId ? `dashboard.html?conv=${m.convId}` : 'dashboard.html';

    let badge = '';
    if (m.status === 'eskalasi')
      badge = `<span class="bdg bdg-yellow"><span class="dot dot-yellow"></span> Eskalasi</span>`;
    else if (m.status === 'baru' || m.status === 'diproses')
      badge = `<span class="bdg bdg-green"><span class="dot dot-green"></span> Bot aktif</span>`;
    else if (m.status === 'selesai')
      badge = `<span class="bdg bdg-blue">Selesai</span>`;
    else
      badge = `<span class="bdg bdg-gray"><span class="dot dot-gray"></span> Belum chat</span>`;

    return `<tr>
      <td>
        <div class="cust-cell">
          <div class="c-av" style="background:${color}">${escH(init2)}</div>
          <div>
            <div class="c-name">${escH(nama)}</div>
            <div class="c-since">${since}</div>
          </div>
        </div>
      </td>
      <td><span class="phone-txt">${escH(cleanPhone(c.wa_number))}</span></td>
      <td style="color:var(--text-2);font-size:12px">${m.count||0} sesi</td>
      <td style="color:var(--text-2);font-size:12px">${lastAt}</td>
      <td>${badge}</td>
      <td style="text-align:center">
        <a class="act" href="${chatUrl}" title="Lihat chat">💬</a>
      </td>
    </tr>`;
  }).join('');

  const end = Math.min(start + PER_PAGE, total);
  document.getElementById('pager-info').textContent = `${start+1}–${end} dari ${total} pelanggan`;
  document.getElementById('btn-prev').disabled = page <= 1;
  document.getElementById('btn-next').disabled = end >= total;
}

function prevPage() { if (page > 1) { page--; renderTable(); } }
function nextPage() { if (page * PER_PAGE < getFiltered().length) { page++; renderTable(); } }

/* ── HELPERS ── */
function cleanPhone(raw) {
  let n = String(raw||'').split('@')[0].replace(/\D/g,'');
  if (!n) return '—';
  if (n.startsWith('0')) n = '62' + n.slice(1);
  if (!n.startsWith('62')) n = '62' + n;
  const local = n.slice(2); // setelah 62
  // LID WhatsApp: lebih dari 12 digit lokal → bukan nomor HP asli
  if (local.length > 12) return '—';
  // Format: +62 8xx-xxxx-xxxx
  if (local.length >= 9) {
    return '+62 ' + local.slice(0,3) + '-' + local.slice(3,7) + '-' + local.slice(7);
  }
  return '+62 ' + local;
}

function relTime(iso) {
  const d = Date.now() - new Date(iso).getTime();
  const m = Math.floor(d/60000);
  if (m < 1)  return 'Baru saja';
  if (m < 60) return m + ' menit lalu';
  const h = Math.floor(m/60);
  if (h < 24) return h + ' jam lalu';
  const dy = Math.floor(h/24);
  if (dy < 7) return dy + ' hari lalu';
  return fmtDate(iso);
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
}
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
