<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Test Cek Ongkir</title>
<style>
  body { font-family: monospace; padding: 20px; background: #111; color: #eee; max-width: 800px; }
  input, button { padding: 8px 12px; margin: 4px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; }
  button { background: #2563eb; color: white; cursor: pointer; border: none; }
  button:hover { background: #1d4ed8; }
  #log { background: #1a1a1a; border: 1px solid #333; padding: 16px; margin-top: 16px; border-radius: 8px; white-space: pre-wrap; min-height: 200px; font-size: 13px; }
  .ok   { color: #4ade80; }
  .err  { color: #f87171; }
  .info { color: #60a5fa; }
  .warn { color: #facc15; }
  h2 { color: #a78bfa; margin-bottom: 4px; }
  label { display: block; margin-top: 10px; color: #aaa; font-size: 12px; }
  .note { color: #6b7280; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
<h2>🧪 Test Cek Ongkir</h2>
<p class="note">Request lewat server Vercel → Mengantar (bukan langsung dari browser)</p>

<label>Base URL Vercel</label>
<input id="baseUrl" value="https://csadsy.vercel.app" style="width:280px">

<label>Cari Origin ID — ketik kelurahan/kecamatan TOKO kamu</label>
<input id="cariOrigin" placeholder="misal: Sewon, Bantul" style="width:300px">
<button onclick="cariOriginId()" style="background:#059669">🔍 Cari</button>
<div id="originResults" style="margin:6px 0; font-size:12px; color:#6b7280"></div>

<label>Origin ID (klik hasil di atas, atau isi manual)</label>
<input id="originId" placeholder="665e8f3a4d9a60571a024487" style="width:320px">

<label>Wilayah tujuan</label>
<input id="wilayah" placeholder="Roworejo, Negerikaton, Pesawaran, Lampung" style="width:420px">

<label>Berat (kg)</label>
<input id="berat" type="number" value="1" step="0.1" style="width:80px">

<br><br>
<button onclick="testOngkir()">🚀 Test Cek Ongkir</button>
<button onclick="clearLog()" style="background:#444">🗑 Clear</button>

<div id="log">Klik "Test Cek Ongkir" untuk mulai...</div>

<script>
function log(msg, type = '') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${type}">${msg}\n</span>`;
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

async function cariOriginId() {
  const base = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
  const keyword = document.getElementById('cariOrigin').value.trim();
  if (!keyword) return;
  const el = document.getElementById('originResults');
  el.innerHTML = 'Mencari...';
  try {
    const res = await fetch(`${base}/api/save-settings?action=cari-origin&keyword=${encodeURIComponent(keyword)}`);
    const json = await res.json();
    if (!json.ok || !json.results.length) { el.innerHTML = '<span style="color:#f87171">Tidak ditemukan</span>'; return; }
    el.innerHTML = json.results.map(r => {
      const id = r._id || r.id;
      const label = [r.SUBDISTRICT_NAME||r.subdistrict, r.DISTRICT_NAME||r.district, r.CITY_NAME||r.city, r.PROVINCE_NAME||r.province].filter(Boolean).join(', ');
      return `<div style="cursor:pointer;padding:3px 6px;margin:2px 0;background:#1e3a5f;border-radius:4px" onclick="document.getElementById('originId').value='${id}';document.getElementById('originResults').innerHTML='<span style=color:#4ade80>✓ Origin ID dipilih: ${id}</span>'">
        <b style="color:#60a5fa">${id}</b> — ${label} (ZIP: ${r.ZIP_CODE||r.posCode||'-'})
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<span style="color:#f87171">${e.message}</span>`; }
}

async function testOngkir() {
  clearLog();
  const base     = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
  const originId = document.getElementById('originId').value.trim();
  const wilayah  = document.getElementById('wilayah').value.trim();
  const berat    = parseFloat(document.getElementById('berat').value) || 1;

  if (!originId) { log('⚠ Isi Origin ID dulu', 'warn'); return; }
  if (!wilayah)  { log('⚠ Isi Wilayah dulu', 'warn'); return; }

  const url = `${base}/api/save-settings?action=test-ongkir&wilayah=${encodeURIComponent(wilayah)}&origin_id=${encodeURIComponent(originId)}&weight=${berat}`;
  log(`→ GET ${url}`, 'info');

  const t = Date.now();
  try {
    const res = await fetch(url);
    const json = await res.json();
    const ms = Date.now() - t;
    log(`✓ Response ${ms}ms\n`, 'ok');

    // Searches (autofill per keyword)
    if (json.searches?.length) {
      log('[autofill searches]', 'info');
      json.searches.forEach(s => {
        const cls = s.count > 0 ? 'ok' : 'warn';
        log(`  "${s.q}" → ${s.count} results (${s.ms}ms)${s.error ? ' ERR:'+s.error : ''}`, cls);
        if (s.first) log(`    area[0]: id=${s.first._id} | ${[s.first.SUBDISTRICT_NAME, s.first.DISTRICT_NAME, s.first.CITY_NAME, s.first.PROVINCE_NAME].filter(Boolean).join(', ')}`, 'info');
      });
      if (json.areaId) log(`[best_area] id=${json.areaId} → ${json.bestAreaLabel || '-'} (allEstimate: ${json.allEstimateMs}ms)`, 'ok');
    }

    if (!json.ok) {
      log(`\n✗ GAGAL: ${json.error}`, 'err');
      if (json.raw) log(`raw: ${JSON.stringify(json.raw).slice(0,300)}`, 'err');
      return;
    }

    log(`\n=== HASIL ONGKIR (${json.kurir?.length ?? 0} kurir) ===`, 'ok');
    (json.kurir || []).forEach(r => {
      log(`  ${r.name.padEnd(14)} Rp ${r.price.toLocaleString('id-ID').padStart(8)}   ${r.est}`, 'ok');
    });

  } catch(e) {
    log(`✗ Fetch error: ${e.message}`, 'err');
  }
}
</script>
</body>
</html>
