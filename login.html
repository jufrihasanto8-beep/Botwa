<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Adsy CS</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);}
.login-wrap{width:100%;max-width:420px;padding:16px;}
.login-card{background:var(--white);border-radius:20px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.35);}
.logo-area{text-align:center;margin-bottom:28px;}
.logo-icon{width:52px;height:52px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;letter-spacing:-1px;margin:0 auto 14px;box-shadow:0 8px 20px rgba(59,130,246,.35);}
.logo-area h1{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.logo-area p{font-size:13px;color:var(--text-2);margin-top:4px;}
.tab-switch{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;border:1px solid var(--border);}
.tab-switch button{flex:1;padding:8px;border:none;border-radius:8px;background:none;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.tab-switch button.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:600;}
.form-section{display:none;}.form-section.active{display:block;}
.error-msg{background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none;}
.success-msg{background:#dcfce7;color:#166534;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none;}
.divider-text{text-align:center;font-size:12px;color:var(--text-3);margin:16px 0;position:relative;}
.divider-text::before,.divider-text::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider-text::before{left:0;}.divider-text::after{right:0;}
.demo-btn{width:100%;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-2);cursor:pointer;transition:all .15s;font-weight:500;}
.demo-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary-mid);}
</style>
</head>
<body>
<div id="toast"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon" style="background:#16a679;font-size:22px;font-weight:800;letter-spacing:-1px;">CS</div>
      <h1>Adsy CS</h1>
      <p>CS Automation Dashboard berbasis AI</p>
    </div>
    <div class="tab-switch">
      <button class="active" onclick="switchTab('login')">Masuk</button>
      <button onclick="switchTab('register')">Daftar</button>
    </div>

    <div class="form-section active" id="section-login">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="nama@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Min. 6 karakter" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">Masuk</button>
      <div class="divider-text">atau</div>
      <button class="demo-btn" id="demo-btn" onclick="loginDemo()">Coba dengan akun demo</button>
    </div>

    <div class="form-section" id="section-register">
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
      <div class="form-group"><label>Nama Lengkap</label><input type="text" id="reg-name" placeholder="Nama Anda"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="nama@email.com"/></div>
      <div class="form-group"><label>Nama Toko / Bisnis</label><input type="text" id="reg-store" placeholder="HerbalCare"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-pass" placeholder="Min. 6 karakter"/></div>
      <div class="form-group"><label>Konfirmasi Password</label><input type="password" id="reg-pass2" placeholder="Ulangi password" onkeydown="if(event.key==='Enter')doRegister()"/></div>
      <button class="btn btn-primary btn-block" id="reg-btn" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
if(Auth.isLoggedIn()) window.location.href='dashboard.html';

function switchTab(tab){
  document.querySelectorAll('.tab-switch button').forEach((b,i)=>b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('section-login').classList.toggle('active',tab==='login');
  document.getElementById('section-register').classList.toggle('active',tab==='register');
}
function showMsg(id,msg,type){
  const el=document.getElementById(id);el.textContent=msg;el.style.display='block';
  if(type==='error')setTimeout(()=>el.style.display='none',5000);
}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass)return showMsg('login-error','Email dan password wajib diisi.','error');
  const btn=document.getElementById('login-btn');
  btn.textContent='Masuk...';btn.disabled=true;
  try{await Auth.login(email,pass);window.location.href='dashboard.html';}
  catch(e){showMsg('login-error',e.message,'error');btn.textContent='Masuk';btn.disabled=false;}
}
async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const store=document.getElementById('reg-store').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  if(!name||!email||!pass)return showMsg('reg-error','Semua field wajib diisi.','error');
  if(pass.length<6)return showMsg('reg-error','Password minimal 6 karakter.','error');
  if(pass!==pass2)return showMsg('reg-error','Password tidak cocok.','error');
  const btn=document.getElementById('reg-btn');
  btn.textContent='Membuat akun...';btn.disabled=true;
  try{
    await Auth.register(name,email,pass,store);
    showMsg('reg-success','Akun berhasil dibuat! Silakan login.','success');
    setTimeout(()=>switchTab('login'),1800);
  }catch(e){showMsg('reg-error',e.message,'error');}
  finally{btn.textContent='Buat Akun';btn.disabled=false;}
}
async function loginDemo(){
  const btn=document.getElementById('demo-btn');
  btn.textContent='Memuat...';btn.disabled=true;
  try{
    try{await Auth.login('demo@adsy.id','demo123');}
    catch{
      await Auth.register('Admin Demo','demo@adsy.id','demo123','Adsy Demo');
      await Auth.login('demo@adsy.id','demo123');
    }
    window.location.href='dashboard.html';
  }catch(e){
    showMsg('login-error','Demo gagal: '+e.message,'error');
    btn.textContent='Coba dengan akun demo';btn.disabled=false;
  }
}
</script>
</body>
</html>
